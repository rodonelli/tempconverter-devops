services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: tempconverter
      MYSQL_USER: tempconverter
      MYSQL_PASSWORD: ci-password
      MYSQL_ROOT_PASSWORD: ci-root-password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
  app:
    build: .
    environment:
      DB_USER: tempconverter
      DB_PASS: ci-password
      DB_HOST: db
      DB_NAME: tempconverter
      STUDENT: CI Student
      COLLEGE: CI College
      SECRET_KEY: ci-only-secret
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:5000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
