version: '3.9'

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-tempconverter}
      MYSQL_USER: ${DB_USER:-tempconverter}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [backend]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.tempconverter-db == true

  app:
    image: ${REGISTRY_IMAGE}
    environment:
      DB_USER: ${DB_USER:-tempconverter}
      DB_PASS: ${DB_PASS}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-tempconverter}
      STUDENT: ${STUDENT}
      COLLEGE: ${COLLEGE}
      SECRET_KEY: ${SECRET_KEY}
    networks: [backend]
    ports:
      - target: 5000
        published: 80
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 2
      endpoint_mode: vip
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: start-first
      placement:
        max_replicas_per_node: 1

networks:
  backend:
    driver: overlay

volumes:
  mysql-data:
